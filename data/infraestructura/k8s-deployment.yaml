apiVersion: apps/v1
kind: Deployment
metadata:
  name: mercashop-api
  namespace: mercashop
  labels:
    app: mercashop-api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mercashop-api
  template:
    metadata:
      labels:
        app: mercashop-api
        tier: backend
    spec:
      containers:
        - name: api
          image: mercashop/api:1.0.0
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mercashop-secrets
                  key: database-url
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mercashop-secrets
                  key: stripe-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mercashop-api-service
  namespace: mercashop
spec:
  type: ClusterIP
  selector:
    app: mercashop-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
